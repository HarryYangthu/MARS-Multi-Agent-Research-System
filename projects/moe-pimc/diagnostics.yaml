version: 1
project: moe-pimc

loop:
  max_iterations: 2
  default_budget: 2
  allowed_targets:
    - coding
    - experiment
  # A missed RES gate routes the repair to Coding by default: the memory-polynomial
  # canceller has too few taps to cancel the PIM memory, so the fix is a focused,
  # additive patch that deepens the canceller (Paper_Total_0327 / forward stay
  # frozen). The Commander pulls the state machine back to the Coding Agent, which
  # emits a patch.vN.diff; a high-severity config_sanity flag instead routes to
  # Experiment to widen the ablation grid.
  default_target: coding
  enable_idea_loop: false

diagnostic_analyzers:
  metrics_gap: true
  config_sanity: true
  code_change_risk: true

metrics:
  # Training residual power ratio (linear). Lower is better. The least-squares
  # canceller converges here even with shallow memory, so loss is a coarse gate.
  loss:
    target: 0.04
    direction: lte
    tolerance: 0.0
    aggregation: max
  # RES = residual / input power in dB (see execution/pim_cancellation.py:54).
  # LOWER is better: -29 dB means the PIM was suppressed to ~the noise floor,
  # -20 dB means significant uncancelled memory effects remain. The gate is the
  # measured midpoint between a shallow-memory batch (mean ~-21 dB) and a
  # deep-memory batch (mean ~-29 dB), so a under-provisioned first attempt fails
  # and the Commander's deeper-canceller repair clears it on the rerun.
  RES:
    target: -26.0
    direction: lte
    tolerance: 0.0
    aggregation: mean
