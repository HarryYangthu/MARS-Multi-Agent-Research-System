project: moe-pimc
repo_mode: local_path           # local_path | git_submodule | mirror
repo_path: ../../workspace/repos/pimc-current   # symlink → /Users/harry/Documents/20_paper/code
read_only: false
sync_strategy: live             # live | snapshot

# Coding Agent may read / propose patches under these subtrees only.
allowed_paths:
  - libs/
  - configs/
  - tests/
  - main.py
  - model.py
  - data_gen.py

# Gate 5 static check: any patch touching these paths is blocked unless
# explicitly approved.
# NOTE: Update class names below to match your real baseline class once you
# tell me which class in libs/ or model.py is the production baseline.
protected_paths:
  - baseline/
  - production_interface/
  - model.py:Paper_Total_0327          # adjust class name as needed

baseline_rules_file: ./AGENTS.md

ignore_patterns:
  - "data/"
  - "*.npy"
  - "*.npz"
  - "*.pt"
  - "*.pth"
  - "*.ckpt"
  - "*.pkl"
  - "__pycache__/"
  - "runs/"
  - ".git/"
  - "logs/"
