# Backend-only reverse proxy for the recommended Vercel frontend + self-hosted API setup.
# Replace api.example.com, then install into /etc/nginx/conf.d/mars-api.conf.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream mars_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.example.com;

    client_max_body_size 512m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://mars_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
    }
}
