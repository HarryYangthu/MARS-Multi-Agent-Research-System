schema: proposal.v1
pass_threshold: 0.8
warn_threshold: 0.65
dimensions:
  - id: testability
    label: Testability
    weight: 0.22
    signals:
      - Explicit testable predictions or measurable success threshold.
      - Hypothesis names observable metrics.
  - id: evidence
    label: Evidence
    weight: 0.22
    signals:
      - Related literature, KB references, or evidence_refs are present.
  - id: downstream_readiness
    label: Downstream Readiness
    weight: 0.2
    signals:
      - Experiment variables, metrics, or ablation hints are present.
  - id: baseline_safety
    label: Baseline Safety
    weight: 0.18
    signals:
      - Baseline compatibility constraints or risks are explicit.
  - id: novelty
    label: Novelty
    weight: 0.18
    signals:
      - Novelty explains concrete delta from baseline or prior work.

