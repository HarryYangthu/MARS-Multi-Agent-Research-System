tools:
  search.local_docs:
    enabled: true
  search.arxiv_search:
    enabled: false   # V0 placeholder; needs network
  knowledge.kb_query:
    enabled: true
  knowledge.baseline_match:
    enabled: true
  knowledge.experiment_memory:
    enabled: true
  knowledge.code_assets:
    enabled: true
  knowledge.methodology:
    enabled: true
  knowledge.run_archive:
    enabled: true
  code.repo_reader:
    enabled: true
  code.patch_generator:
    enabled: true
