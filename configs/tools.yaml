  # configs/gates.yaml::baseline_compatibility.monitored_tools.
  code.write_file:
    enabled: true
  code.delete_file:
    enabled: true
  code.test_runner:
    enabled: true
  code.lint:
    enabled: true
  execution.simulation_runner:
    enabled: true
  execution.batch_runner:
    enabled: true
  execution.log_streamer:
    enabled: true
  execution.metrics_collector:
    enabled: true
