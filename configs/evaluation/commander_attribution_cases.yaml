version: 1
project: pimc
cases:
  - id: experiment_config_high
    description: High config sanity signal should route to Experiment.
    expected_target: experiment
    expected_should_continue: true
    expected_requires_human: false
    attempt: 1
    config:
      max_iterations: 2
      allowed_targets: [coding, experiment]
      default_target: experiment
    analysis:
      passed: false
      failed_metrics:
        - metric: loss
          observed: 0.5
          target: 0.04
          direction: lte
          gap: 0.46
          aggregation: max
      suspected_causes:
        - kind: metrics_gap
          summary: Configured metric missed threshold.
          severity: high
          evidence: [metric:loss]
        - kind: config_sanity
          summary: Experiment plan has no ablations.
          severity: high
          evidence: [experiment_plan.ablations]
      evidence_refs:
        - execution/metrics.json
        - experiment/experiment_plan.approved.md

  - id: coding_risk_high
